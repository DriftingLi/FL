# railway.toml：Railway 部署配置
# https://docs.railway.app/deploy/config-as-code

[build]
builder = "nixpacks"
dockerfilePath = "Dockerfile"

[deploy]
# 健康检查路径
healthcheckPath = "/api/health"
healthcheckTimeout = 30
# 启动命令（nixpacks 构建产物）
startCommand = "./bin/server"
# 重启策略
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# 环境变量（Railway PostgreSQL 插件会自动注入 DATABASE_URL）
[[deploy.plugins]]
# 启用 PostgreSQL 插件（Railway 会自动提供 DATABASE_URL=postgresql://...）
name = "postgresql"

[env]
APP_ENV = "production"
PORT = "8080"
# CORS 允许的前端源（按需修改）
CORS_ORIGINS = "{{CORS_ORIGINS}}"
# 上传文件存储（Railway 持久卷挂载路径）
VOLUME_MOUNT_PATH = "/data"
UPLOAD_FOLDER = "/data/uploads"
# PDF 报告输出目录（持久卷，避免容器重启后丢失）
VALUATION_PDF_OUTPUT_DIR = "/data/reports"
# AI 配置（在 Railway 变量中设置）
# ZHIPU_API_KEY = ""
# ZHIPU_BASE_URL = "https://open.bigmodel.cn/api/paas/v4"
# ZHIPU_MODEL = "glm-4.7-flash"

# 持久卷挂载（用于上传文件存储）
[[deploy.volumes]]
name = "uploads"
mountPath = "/data"
