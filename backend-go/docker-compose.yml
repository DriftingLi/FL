# 本地开发环境：Docker 容器化 PostgreSQL
# 使用：make dev-up / docker compose up -d
services:
  postgres:
    image: postgres:15-alpine
    container_name: forklift-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: forklift_training
      POSTGRES_USER: forklift
      POSTGRES_PASSWORD: forklift123
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forklift -d forklift_training"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 可选：LibreOffice sidecar，用于 PPT→PDF 转换（无宿主污染）
  # 取消注释以启用；Go 后端通过 HTTP/命令行调用该容器
  # libreoffice:
  #   image: linuxserver/libreoffice:latest
  #   container_name: forklift-libreoffice
  #   restart: unless-stopped
  #   environment:
  #     PUID: 1000
  #     PGID: 1000
  #     TZ: Asia/Shanghai
  #   volumes:
  #     - ./static/uploads:/uploads
  #   ports:
  #     - "3000:3000"

volumes:
  pgdata:
    driver: local
