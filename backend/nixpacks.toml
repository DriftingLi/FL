# nixpacks.toml：Railway/nixpacks Go 构建配置
# https://nixpacks.com/docs/configuration/file

[phases.setup]
nixPkgs = ["go_1_26", "gcc"]

[phases.build]
cmds = [
    "CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o bin/server ./cmd/server",
]

[start]
cmd = "./bin/server"

[variables]
CGO_ENABLED = "0"
GO_VERSION = "1.26"
