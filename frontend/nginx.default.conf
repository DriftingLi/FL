# ===== 前端 Nginx 配置 =====
# 用于 Docker 容器中代理 API 请求到后端，托管静态资源
# 前端容器兼任 SSL 终止 + API 反代 + 静态文件托管
#
# 注意：${DOMAIN} 占位符由容器启动时 envsubst 自动替换为实际域名
# （来自 DOMAIN 环境变量，由 GitHub Secrets 注入）
# 域名策略：不使用根域名，主站统一走 www 子域名；
# 根域名请求 301 重定向到 www.根域名。

# ===== HTTP 80 端口：全部重定向到 HTTPS =====
server {
    listen 80;
    server_name _;

    # 健康检查端点：不重定向到 HTTPS
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    return 301 https://$host$request_uri;
}

# ===== HTTPS 根域名 → www 主域名 301 重定向 =====
server {
    listen 443 ssl;
    http2 on;
    server_name ${DOMAIN};
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    return 301 https://www.${DOMAIN}$request_uri;
}

# ===== HTTPS 主服务器（www 主站 + 所有子域名） =====
server {
    listen 443 ssl;
    http2 on;
    server_name www.${DOMAIN} *.${DOMAIN};

    # SSL 证书配置（证书文件挂载到 /etc/nginx/ssl/）
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # 访问日志（生产环境建议关闭以减少 IO）
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # 客户端上传大小限制（与后端 MAX_CONTENT_LENGTH_MB 对齐）
    client_max_body_size 250M;

    # 根目录
    root /usr/share/nginx/html;
    index index.html;

    # ===== API 反向代理 =====
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ===== 静态资源代理 =====
    location /static/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # ===== 健康检查端点 =====
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # ===== SPA 路由回退 =====
    # Vue Router history 模式下，所有非文件路径回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;

        # 静态资源缓存策略
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ===== 安全头 =====
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ===== 禁止访问隐藏文件 =====
    location ~ /\. {
        deny all;
        access_log off;
    }

    # ===== Gzip 压缩 =====
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;
}
