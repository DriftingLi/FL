# ===== 生产环境 Docker Compose 编排 =====
# 架构：PostgreSQL + Go 后端 + Nginx 前端（全栈 Docker 部署）
# 前端容器兼任 SSL 终止 + API 反代 + 静态文件托管
# 使用：docker compose -f docker-compose.prod.yml up -d
# 前置：确保 .env 已正确配置

services:
  # ==========================================
  # PostgreSQL 数据库
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: forklift-pg-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: forklift_training
      POSTGRES_USER: ${DB_USER:-forklift}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-forklift} -d forklift_training"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - forklift-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ==========================================
  # Redis 缓存（纯缓存定位：禁用持久化，LRU 淘汰）
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: forklift-redis-prod
    restart: unless-stopped
    # REDIS_PASSWORD 为空时不启用 requirepass（Redis 仅在内网 Docker 网络访问，不暴露端口）
    # 使用 shell 形式以便用参数扩展处理可选密码
    command: >
      sh -c '
      if [ -n "$$REDIS_PASSWORD" ]; then
        exec redis-server --requirepass "$$REDIS_PASSWORD" --maxmemory 200mb --maxmemory-policy allkeys-lru --save "" --appendonly no --timeout 300 --tcp-keepalive 60
      else
        exec redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru --save "" --appendonly no --timeout 300 --tcp-keepalive 60
      fi
      '
    # 不暴露到宿主机，仅 Docker 内部网络访问
    expose:
      - "6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redisdata-prod:/data
    healthcheck:
      # 密码为空时 redis-cli ping；非空时 redis-cli -a <password> ping
      test: ["CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+-a $${REDIS_PASSWORD}} ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - forklift-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ==========================================
  # Go 后端服务（仅内网可访问，通过前端 Nginx 反代）
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-forklift-backend:latest}
    container_name: forklift-backend-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      PORT: "8080"
      DATABASE_URL: postgres://${DB_USER:-forklift}:${DB_PASSWORD}@postgres:5432/forklift_training?sslmode=disable
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRES_HOURS: "${JWT_EXPIRES_HOURS:-24}"
      # CORS：必须包含主域名 + 四个子域名（training/valuation/mentor/manage，逗号分隔）
      # 例：https://www.example.com,https://training.example.com,https://valuation.example.com,https://mentor.example.com,https://manage.example.com
      CORS_ORIGINS: ${CORS_ORIGINS}
      UPLOAD_FOLDER: /data/uploads
      VOLUME_MOUNT_PATH: /data
      MAX_CONTENT_LENGTH_MB: "250"
      ZHIPU_API_KEY: ${ZHIPU_API_KEY}
      ZHIPU_BASE_URL: ${ZHIPU_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      ZHIPU_MODEL: ${ZHIPU_MODEL:-glm-4.7-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      COZE_PROJECT_ID: ${COZE_PROJECT_ID:-}
      COZE_OAUTH_APP_ID: ${COZE_OAUTH_APP_ID:-}
      COZE_OAUTH_KID: ${COZE_OAUTH_KID:-}
      COZE_OAUTH_PRIVATE_KEY: ${COZE_OAUTH_PRIVATE_KEY:-}
      COZE_OAUTH_PRIVATE_KEY_PATH: ${COZE_OAUTH_PRIVATE_KEY_PATH:-}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD}
      TUTOR_DEFAULT_PASSWORD: ${TUTOR_DEFAULT_PASSWORD}
      STUDENT_DEFAULT_PASSWORD: ${STUDENT_DEFAULT_PASSWORD}
      VALUATION_PDF_OUTPUT_DIR: /data/reports
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: "${REDIS_DB:-0}"
      REDIS_POOL_SIZE: "${REDIS_POOL_SIZE:-10}"
      REDIS_KEY_PREFIX: "${REDIS_KEY_PREFIX:-fl:}"
      TZ: Asia/Shanghai
    # 仅内网可访问，不对外暴露端口（通过前端 Nginx 反代 /api/ 路径访问）
    expose:
      - "8080"
    volumes:
      - uploads-data:/data/uploads
      - reports-data:/data/reports
      # Coze 私钥文件（避免 .env 转义问题）
      - ./coze_private_key.pem:/etc/secrets/coze_private_key.pem:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - forklift-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ==========================================
  # Nginx 前端服务（SSL 终止 + API 反代 + 静态文件托管）
  # ==========================================
  frontend:
    image: ${FRONTEND_IMAGE:-forklift-frontend:latest}
    container_name: forklift-frontend-prod
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      # 域名（由 GitHub Secrets 注入，启动时 envsubst 替换 nginx 配置中的 ${DOMAIN}）
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      # SSL 证书挂载（只读，路径与 deploy-remote.sh 中 write_ssl_certs() 一致）
      - ${DEPLOY_PATH:-/opt/forklift-training}/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - forklift-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

networks:
  forklift-net:
    driver: bridge

volumes:
  pgdata-prod:
    driver: local
  redisdata-prod:
    driver: local
  uploads-data:
    driver: local
  reports-data:
    driver: local
