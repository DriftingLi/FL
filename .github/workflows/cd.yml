name: CD - 持续部署

on:
  # CI 通过后自动触发部署（确保部署的是已测试的代码）
  workflow_run:
    workflows: ["CI - 持续集成"]
    types: [completed]
    branches: [master]
  # 手动触发（可跳过 CI 门禁，用于紧急修复）
  workflow_dispatch:
    inputs:
      environment:
        description: 部署目标环境
        type: choice
        default: staging
        options:
          - staging
          - production
      skip_backend:
        description: 跳过后端部署
        type: boolean
        default: false
      skip_frontend:
        description: 跳过前端部署
        type: boolean
        default: false
      skip_migration:
        description: 跳过数据库迁移
        type: boolean
        default: false

concurrency:
  group: cd-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ vars.REGISTRY || 'ghcr.io' }}/${{ github.repository }}-backend
  IMAGE_FRONTEND: ${{ vars.REGISTRY || 'ghcr.io' }}/${{ github.repository }}-frontend
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/forklift-training' }}
  COMPOSE_FILE: ${{ vars.COMPOSE_FILE || 'docker-compose.prod.yml' }}

jobs:
  # ============================================================
  # Stage 0: CI 门禁（workflow_run 触发时检查 CI 是否成功）
  # ============================================================
  ci-gate:
    if: ${{ github.event_name == 'workflow_run' }}
    runs-on: ubuntu-latest
    steps:
      - name: 检查 CI 结论
        run: |
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          echo "CI 结论: $CONCLUSION"
          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::CI 未通过 ($CONCLUSION)，取消部署"
            exit 1
          fi
          echo "✅ CI 已通过，继续部署"

  # ============================================================
  # Stage 1: 构建后端 Docker 镜像并推送 ghcr.io
  # ============================================================
  build-backend:
    needs: ci-gate
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || needs.ci-gate.result == 'success') &&
      !(github.event_name == 'workflow_dispatch' && inputs.skip_backend)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run 模式下检出触发 CI 的那个 commit
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取镜像标签
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=sha,prefix=,format=short
            type=raw,value=${{ github.event.workflow_run.head_sha || github.sha }}
            type=ref,event=branch

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

  # ============================================================
  # Stage 1.5: 构建前端 Docker 镜像并推送 ghcr.io（与后端并行）
  # ============================================================
  build-frontend:
    needs: ci-gate
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || needs.ci-gate.result == 'success') &&
      !(github.event_name == 'workflow_dispatch' && inputs.skip_frontend)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run 模式下检出触发 CI 的那个 commit
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取镜像标签
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=sha,prefix=,format=short
            type=raw,value=${{ github.event.workflow_run.head_sha || github.sha }}
            type=ref,event=branch

      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

  # ============================================================
  # Stage 2: 通过公网 SSH 部署全栈到自托管服务器
  # ============================================================
  deploy:
    needs: [build-backend, build-frontend]
    if: |
      always() &&
      needs.build-backend.result == 'success' &&
      needs.build-frontend.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}
    env:
      # 镜像信息（来自 build-backend/build-frontend outputs）
      IMAGE_TAG: ${{ needs.build-backend.outputs.image_tag || github.sha }}
      # SSL 证书内容（从 GitHub Secrets 注入，部署时写入服务器固定路径）
      SSL_FULLCHAIN: ${{ secrets.SSL_FULLCHAIN }}
      SSL_PRIVKEY: ${{ secrets.SSL_PRIVKEY }}
      # 残值评估
      VALUATION_JWT_SECRET_KEY: ${{ secrets.VALUATION_JWT_SECRET_KEY }}
      # 域名（启动时 envsubst 替换 nginx 配置中的 ${DOMAIN}）
      DOMAIN: ${{ secrets.DOMAIN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # 数据库
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      # 密钥
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      JWT_EXPIRES_HOURS: ${{ secrets.JWT_EXPIRES_HOURS || '24' }}
      # 默认账号
      ADMIN_DEFAULT_PASSWORD: ${{ secrets.ADMIN_DEFAULT_PASSWORD }}
      TUTOR_DEFAULT_PASSWORD: ${{ secrets.TUTOR_DEFAULT_PASSWORD }}
      STUDENT_DEFAULT_PASSWORD: ${{ secrets.STUDENT_DEFAULT_PASSWORD }}
      # CORS
      CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
      # AI 配置
      ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
      ZHIPU_BASE_URL: ${{ secrets.ZHIPU_BASE_URL || 'https://open.bigmodel.cn/api/paas/v4' }}
      ZHIPU_MODEL: ${{ secrets.ZHIPU_MODEL || 'glm-4.7-flash' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # Coze 配置
      COZE_PROJECT_ID: ${{ secrets.COZE_PROJECT_ID }}
      COZE_OAUTH_APP_ID: ${{ secrets.COZE_OAUTH_APP_ID }}
      COZE_OAUTH_KID: ${{ secrets.COZE_OAUTH_KID }}
      COZE_OAUTH_PRIVATE_KEY: ${{ secrets.COZE_OAUTH_PRIVATE_KEY }}
      COZE_OAUTH_PRIVATE_KEY_PATH: ${{ secrets.COZE_OAUTH_PRIVATE_KEY_PATH }}
      # 部署选项
      SKIP_MIGRATION: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_migration || 'false' }}
      # Redis 缓存
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD || '' }}
      REDIS_DB: ${{ secrets.REDIS_DB || '0' }}
      REDIS_POOL_SIZE: ${{ secrets.REDIS_POOL_SIZE || '10' }}
      REDIS_KEY_PREFIX: ${{ secrets.REDIS_KEY_PREFIX || 'fl:' }}
      # SSH 连接（公网 IP）
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT || '2222' }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # --------------------------------------------------------
      # Step 2.1: 配置 SSH
      # --------------------------------------------------------
      - name: 配置 SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" \
            -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "AddressFamily inet" >> ~/.ssh/config

      # --------------------------------------------------------
      # Step 2.2: 上传部署脚本和配置
      # --------------------------------------------------------
      - name: 上传部署脚本和配置
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=3"

          scp $SSH_OPTS \
            -P "$SSH_PORT" \
            scripts/deploy-remote.sh docker-compose.prod.yml \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

          ssh $SSH_OPTS \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "chmod +x $DEPLOY_PATH/deploy-remote.sh"

      # --------------------------------------------------------
      # Step 2.3: 生成环境变量文件并执行远程部署
      #           用 printf %q 安全转义所有特殊字符
      # --------------------------------------------------------
      - name: 生成环境变量文件并执行远程部署
        run: |
          # 用 printf %q 生成安全转义的环境变量文件
          # %q 会自动处理换行、引号、$ 等特殊字符，比 sed 替换安全得多
          {
            echo '#!/bin/bash'
            echo '# 由 GitHub Actions CD 自动生成 — 请勿手动编辑'
            echo "# 生成时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ''
            printf 'export IMAGE_TAG=%q\n' "${IMAGE_TAG:-latest}"
            printf 'export IMAGE_BACKEND=%q\n' "${IMAGE_BACKEND:-}"
            printf 'export IMAGE_FRONTEND=%q\n' "${IMAGE_FRONTEND:-}"
            printf 'export SSL_FULLCHAIN=%q\n' "${SSL_FULLCHAIN:-}"
            printf 'export SSL_PRIVKEY=%q\n' "${SSL_PRIVKEY:-}"
            printf 'export DOMAIN=%q\n' "${DOMAIN:-}"
            printf 'export GITHUB_TOKEN=%q\n' "${GITHUB_TOKEN:-}"
            printf 'export REGISTRY=%q\n' "${REGISTRY:-ghcr.io}"
            printf 'export DATABASE_URL=%q\n' "${DATABASE_URL:-}"
            printf 'export DB_USER=%q\n' "${DB_USER:-forklift}"
            printf 'export DB_PASSWORD=%q\n' "${DB_PASSWORD:-}"
            printf 'export SECRET_KEY=%q\n' "${SECRET_KEY:-}"
            printf 'export JWT_SECRET_KEY=%q\n' "${JWT_SECRET_KEY:-}"
            printf 'export JWT_EXPIRES_HOURS=%q\n' "${JWT_EXPIRES_HOURS:-24}"
            printf 'export ADMIN_DEFAULT_PASSWORD=%q\n' "${ADMIN_DEFAULT_PASSWORD:-}"
            printf 'export TUTOR_DEFAULT_PASSWORD=%q\n' "${TUTOR_DEFAULT_PASSWORD:-}"
            printf 'export STUDENT_DEFAULT_PASSWORD=%q\n' "${STUDENT_DEFAULT_PASSWORD:-}"
            printf 'export CORS_ORIGINS=%q\n' "${CORS_ORIGINS:-}"
            printf 'export ZHIPU_API_KEY=%q\n' "${ZHIPU_API_KEY:-}"
            printf 'export ZHIPU_BASE_URL=%q\n' "${ZHIPU_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}"
            printf 'export ZHIPU_MODEL=%q\n' "${ZHIPU_MODEL:-glm-4.7-flash}"
            printf 'export OPENAI_API_KEY=%q\n' "${OPENAI_API_KEY:-}"
            printf 'export COZE_PROJECT_ID=%q\n' "${COZE_PROJECT_ID:-}"
            printf 'export COZE_OAUTH_APP_ID=%q\n' "${COZE_OAUTH_APP_ID:-}"
            printf 'export COZE_OAUTH_KID=%q\n' "${COZE_OAUTH_KID:-}"
            printf 'export COZE_OAUTH_PRIVATE_KEY=%q\n' "${COZE_OAUTH_PRIVATE_KEY:-}"
            printf 'export COZE_OAUTH_PRIVATE_KEY_PATH=%q\n' "${COZE_OAUTH_PRIVATE_KEY_PATH:-}"
            printf 'export VALUATION_JWT_SECRET_KEY=%q\n' "${VALUATION_JWT_SECRET_KEY:-}"
            printf 'export COMPOSE_FILE=%q\n' "${COMPOSE_FILE:-docker-compose.prod.yml}"
            printf 'export DEPLOY_PATH=%q\n' "${DEPLOY_PATH:-/opt/forklift-training}"
            printf 'export SKIP_MIGRATION=%q\n' "${SKIP_MIGRATION:-false}"
            printf 'export REDIS_PASSWORD=%q\n' "${REDIS_PASSWORD:-}"
            printf 'export REDIS_DB=%q\n' "${REDIS_DB:-0}"
            printf 'export REDIS_POOL_SIZE=%q\n' "${REDIS_POOL_SIZE:-10}"
            printf 'export REDIS_KEY_PREFIX=%q\n' "${REDIS_KEY_PREFIX:-fl:}"
          } > /tmp/deploy-env.sh

          echo "环境变量文件已生成（$(wc -l < /tmp/deploy-env.sh) 行）"
          echo "注意：密钥值已被 GitHub Actions 自动 mask，不会出现在日志中"

          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=3"

          # 上传环境变量文件
          scp $SSH_OPTS \
            -P "$SSH_PORT" \
            /tmp/deploy-env.sh \
            "$SSH_USER@$SSH_HOST:/tmp/deploy-env.sh"

          # 执行远程部署
          ssh $SSH_OPTS \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "set -e; source /tmp/deploy-env.sh; shred -u /tmp/deploy-env.sh 2>/dev/null || rm -f /tmp/deploy-env.sh; cd \"\$DEPLOY_PATH\" && bash deploy-remote.sh"

      # --------------------------------------------------------
      # Step 2.4: 清理
      # --------------------------------------------------------
      - name: 清理 SSH 密钥
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key /tmp/deploy-env.sh

  # ============================================================
  # Stage 4: 全栈自动回滚（通过公网 SSH）
  # ============================================================
  rollback:
    needs: deploy
    if: |
      always() &&
      needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT || '2222' }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: 配置 SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" \
            -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 执行远程回滚
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "cd \"$DEPLOY_PATH\" && bash deploy-remote.sh --rollback"
          echo "::warning::全栈自动回滚已执行!"

      - name: 清理
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key

  # ============================================================
  # Stage 6: 部署汇总
  # ============================================================
  notify:
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 汇总部署状态
        run: |
          DEPLOY_STATUS="${{ needs.deploy.result }}"

          echo "# 部署报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 全栈部署 (公网 SSH) | $([ "$DEPLOY_STATUS" = 'success' ] && echo '✅' || ([ "$DEPLOY_STATUS" = 'skipped' ] && echo '⏭️') || echo '❌') |" >> $GITHUB_STEP_SUMMARY
          echo "| 前端 | $([ "$DEPLOY_STATUS" = 'success' ] && echo '✅ 已部署' || echo '⚠️') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 后端 API: ${{ vars.API_URL || '未配置' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 前端: ${{ vars.FRONTEND_URL || '未配置' }}" >> $GITHUB_STEP_SUMMARY
        shell: bash
