name: CD - 持续部署（Tailscale SSH）

on:
  # CI 通过后自动触发部署（确保部署的是已测试的代码）
  workflow_run:
    workflows: ["CI - 持续集成"]
    types: [completed]
    branches: [master]
  # 手动触发（可跳过 CI 门禁，用于紧急修复）
  workflow_dispatch:
    inputs:
      environment:
        description: 部署目标环境
        type: choice
        default: staging
        options:
          - staging
          - production
      skip_backend:
        description: 跳过后端部署
        type: boolean
        default: false
      skip_migration:
        description: 跳过数据库迁移
        type: boolean
        default: false

concurrency:
  group: cd-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ vars.REGISTRY || 'ghcr.io' }}/${{ github.repository }}-backend
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/forklift-training' }}
  COMPOSE_FILE: ${{ vars.COMPOSE_FILE || 'docker-compose.prod.yml' }}
  TAILSCALE_VERSION: "v2"
  TAILSCALE_TAG: "tag:ci"

jobs:
  # ============================================================
  # Stage 0: CI 门禁（workflow_run 触发时检查 CI 是否成功）
  # ============================================================
  ci-gate:
    if: ${{ github.event_name == 'workflow_run' }}
    runs-on: ubuntu-latest
    steps:
      - name: 检查 CI 结论
        run: |
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          echo "CI 结论: $CONCLUSION"
          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::CI 未通过 ($CONCLUSION)，取消部署"
            exit 1
          fi
          echo "✅ CI 已通过，继续部署"

  # ============================================================
  # Stage 1: 构建后端 Docker 镜像并推送 ghcr.io
  # ============================================================
  build-backend:
    needs: ci-gate
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || needs.ci-gate.result == 'success') &&
      !(github.event_name == 'workflow_dispatch' && inputs.skip_backend)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run 模式下检出触发 CI 的那个 commit
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取镜像标签
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=sha,prefix=,format=short
            type=raw,value=${{ github.event.workflow_run.head_sha || github.sha }}
            type=ref,event=branch

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v6
        with:
          context: backend-go
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

  # ============================================================
  # Stage 2: 通过 Tailscale SSH 部署后端到自托管服务器
  # ============================================================
  deploy-backend:
    needs: build-backend
    if: |
      always() &&
      needs.build-backend.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}
    env:
      # 镜像信息（来自 build-backend outputs）
      IMAGE_TAG: ${{ needs.build-backend.outputs.image_tag || github.sha }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # 数据库
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      # 密钥
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      JWT_EXPIRES_HOURS: ${{ secrets.JWT_EXPIRES_HOURS || '24' }}
      # 默认账号
      ADMIN_DEFAULT_PASSWORD: ${{ secrets.ADMIN_DEFAULT_PASSWORD }}
      TUTOR_DEFAULT_PASSWORD: ${{ secrets.TUTOR_DEFAULT_PASSWORD }}
      STUDENT_DEFAULT_PASSWORD: ${{ secrets.STUDENT_DEFAULT_PASSWORD }}
      # CORS
      CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
      # AI 配置
      ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
      ZHIPU_BASE_URL: ${{ secrets.ZHIPU_BASE_URL || 'https://open.bigmodel.cn/api/paas/v4' }}
      ZHIPU_MODEL: ${{ secrets.ZHIPU_MODEL || 'glm-4.7-flash' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # Coze 配置
      COZE_PROJECT_ID: ${{ secrets.COZE_PROJECT_ID }}
      COZE_OAUTH_APP_ID: ${{ secrets.COZE_OAUTH_APP_ID }}
      COZE_OAUTH_KID: ${{ secrets.COZE_OAUTH_KID }}
      COZE_OAUTH_PRIVATE_KEY: ${{ secrets.COZE_OAUTH_PRIVATE_KEY }}
      COZE_OAUTH_PRIVATE_KEY_PATH: ${{ secrets.COZE_OAUTH_PRIVATE_KEY_PATH }}
      # 部署选项
      SKIP_MIGRATION: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_migration || 'false' }}
      BACKEND_PORT: ${{ secrets.BACKEND_PORT || '8081' }}
      # Redis 缓存
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD || '' }}
      REDIS_DB: ${{ secrets.REDIS_DB || '0' }}
      REDIS_POOL_SIZE: ${{ secrets.REDIS_POOL_SIZE || '10' }}
      REDIS_KEY_PREFIX: ${{ secrets.REDIS_KEY_PREFIX || 'fl:' }}
      # Tailscale
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
      TAILSCALE_HOST: ${{ secrets.TAILSCALE_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # --------------------------------------------------------
      # Step 2.1: 加入 Tailscale 网络
      # --------------------------------------------------------
      - name: 连接 Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_SECRET }}
          tags: ${{ env.TAILSCALE_TAG }}

      - name: 验证 Tailscale 连通性
        run: |
          set -x
          echo "=== Tailscale 自诊断 ==="
          echo ""
          echo "TAILSCALE_HOST = ******** (长度: ${#TAILSCALE_HOST})"
          echo ""
          # Tailnet 信息
          echo "--- Tailnet ---"
          echo "  TAILSCALE_HOST 值长度: ${#TAILSCALE_HOST}"
          echo ""
          echo "--- Tailscale 本机节点 ---"
          tailscale status --json 2>/dev/null > /tmp/ts.json
          if [ -s /tmp/ts.json ]; then
            echo "  本机: $(jq -r '.Self.HostName // "?"' /tmp/ts.json)"
            echo "  IP:   $(jq -r '.Self.TailscaleIPs[0] // "?"' /tmp/ts.json)"
            echo "  Tailnet: $(jq -r '.CurrentTailnet.Name // "?"' /tmp/ts.json)"
            echo "  Online: $(jq -r '.Self.Online' /tmp/ts.json)"
            PEERS=$(jq -r '.Peer | length' /tmp/ts.json)
            echo "  可见节点数: $PEERS"
            if [ "$PEERS" -gt 0 ]; then
              jq -r '.Peer | to_entries[] | "    \(.value.HostName // "?"): \(.value.TailscaleIPs[0] // "?") (online=\(.value.Online))"' /tmp/ts.json
            else
              echo "    （看不到其他设备——ACL 或 tailnet 不匹配）"
            fi
          else
            echo "  （无法获取 Tailscale 状态 JSON）"
          fi
          echo ""
          echo "=== 连通性测试 ==="
          # tailscale ping 直连成功 exit 0；走 DERP 中继时仍能通但可能 exit 非零
          # 只要收到 pong（直接或 DERP 中继都算通），SSH 就能用
          set +e  # tailscale ping 走 DERP 时 exit 非零，不要因此中断
          TS_PING_OUT=$(tailscale ping --c 3 "$TAILSCALE_HOST" 2>&1)
          TS_PING_RC=$?
          set -e
          echo "$TS_PING_OUT"
          if echo "$TS_PING_OUT" | grep -q "pong"; then
            echo "✅ Tailscale 连接正常（$([ $TS_PING_RC -eq 0 ] && echo '直连' || echo 'DERP 中继')）"
          else
            echo "❌ 无法通过 Tailscale 连接服务器"
            exit 1
          fi

      # --------------------------------------------------------
      # Step 2.2: 配置 SSH
      # --------------------------------------------------------
      - name: 配置 SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" \
            -H "$TAILSCALE_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "AddressFamily inet" >> ~/.ssh/config

      # --------------------------------------------------------
      # Step 2.3: 上传部署脚本和配置
      # --------------------------------------------------------
      - name: 上传部署脚本和配置
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15"

          scp $SSH_OPTS \
            -P "$SSH_PORT" \
            scripts/deploy-remote.sh docker-compose.prod.yml \
            "$SSH_USER@$TAILSCALE_HOST:$DEPLOY_PATH/"

          ssh $SSH_OPTS \
            -p "$SSH_PORT" \
            "$SSH_USER@$TAILSCALE_HOST" \
            "chmod +x $DEPLOY_PATH/deploy-remote.sh"

      # --------------------------------------------------------
      # Step 2.4: 生成环境变量文件并执行远程部署
      #           用 printf %q 安全转义所有特殊字符
      # --------------------------------------------------------
      - name: 生成环境变量文件并执行远程部署
        run: |
          # 用 printf %q 生成安全转义的环境变量文件
          # %q 会自动处理换行、引号、$ 等特殊字符，比 sed 替换安全得多
          {
            echo '#!/bin/bash'
            echo '# 由 GitHub Actions CD 自动生成 — 请勿手动编辑'
            echo "# 生成时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ''
            printf 'export IMAGE_TAG=%q\n' "${IMAGE_TAG:-latest}"
            printf 'export IMAGE_BACKEND=%q\n' "${IMAGE_BACKEND:-}"
            printf 'export GITHUB_TOKEN=%q\n' "${GITHUB_TOKEN:-}"
            printf 'export REGISTRY=%q\n' "${REGISTRY:-ghcr.io}"
            printf 'export DATABASE_URL=%q\n' "${DATABASE_URL:-}"
            printf 'export DB_USER=%q\n' "${DB_USER:-forklift}"
            printf 'export DB_PASSWORD=%q\n' "${DB_PASSWORD:-}"
            printf 'export SECRET_KEY=%q\n' "${SECRET_KEY:-}"
            printf 'export JWT_SECRET_KEY=%q\n' "${JWT_SECRET_KEY:-}"
            printf 'export JWT_EXPIRES_HOURS=%q\n' "${JWT_EXPIRES_HOURS:-24}"
            printf 'export ADMIN_DEFAULT_PASSWORD=%q\n' "${ADMIN_DEFAULT_PASSWORD:-}"
            printf 'export TUTOR_DEFAULT_PASSWORD=%q\n' "${TUTOR_DEFAULT_PASSWORD:-}"
            printf 'export STUDENT_DEFAULT_PASSWORD=%q\n' "${STUDENT_DEFAULT_PASSWORD:-}"
            printf 'export CORS_ORIGINS=%q\n' "${CORS_ORIGINS:-}"
            printf 'export ZHIPU_API_KEY=%q\n' "${ZHIPU_API_KEY:-}"
            printf 'export ZHIPU_BASE_URL=%q\n' "${ZHIPU_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}"
            printf 'export ZHIPU_MODEL=%q\n' "${ZHIPU_MODEL:-glm-4.7-flash}"
            printf 'export OPENAI_API_KEY=%q\n' "${OPENAI_API_KEY:-}"
            printf 'export COZE_PROJECT_ID=%q\n' "${COZE_PROJECT_ID:-}"
            printf 'export COZE_OAUTH_APP_ID=%q\n' "${COZE_OAUTH_APP_ID:-}"
            printf 'export COZE_OAUTH_KID=%q\n' "${COZE_OAUTH_KID:-}"
            printf 'export COZE_OAUTH_PRIVATE_KEY=%q\n' "${COZE_OAUTH_PRIVATE_KEY:-}"
            printf 'export COZE_OAUTH_PRIVATE_KEY_PATH=%q\n' "${COZE_OAUTH_PRIVATE_KEY_PATH:-}"
            printf 'export COMPOSE_FILE=%q\n' "${COMPOSE_FILE:-docker-compose.prod.yml}"
            printf 'export DEPLOY_PATH=%q\n' "${DEPLOY_PATH:-/opt/forklift-training}"
            printf 'export SKIP_MIGRATION=%q\n' "${SKIP_MIGRATION:-false}"
            printf 'export BACKEND_PORT=%q\n' "${BACKEND_PORT:-8081}"
            printf 'export REDIS_PASSWORD=%q\n' "${REDIS_PASSWORD:-}"
            printf 'export REDIS_DB=%q\n' "${REDIS_DB:-0}"
            printf 'export REDIS_POOL_SIZE=%q\n' "${REDIS_POOL_SIZE:-10}"
            printf 'export REDIS_KEY_PREFIX=%q\n' "${REDIS_KEY_PREFIX:-fl:}"
          } > /tmp/deploy-env.sh

          echo "环境变量文件已生成（$(wc -l < /tmp/deploy-env.sh) 行）"
          echo "注意：密钥值已被 GitHub Actions 自动 mask，不会出现在日志中"

          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15"

          # 上传环境变量文件
          scp $SSH_OPTS \
            -P "$SSH_PORT" \
            /tmp/deploy-env.sh \
            "$SSH_USER@$TAILSCALE_HOST:/tmp/deploy-env.sh"

          # 执行远程部署
          ssh $SSH_OPTS \
            -p "$SSH_PORT" \
            "$SSH_USER@$TAILSCALE_HOST" \
            "set -e; source /tmp/deploy-env.sh; shred -u /tmp/deploy-env.sh 2>/dev/null || rm -f /tmp/deploy-env.sh; cd \"\$DEPLOY_PATH\" && bash deploy-remote.sh"

      # --------------------------------------------------------
      # Step 2.5: 清理
      # --------------------------------------------------------
      - name: 清理 SSH 密钥
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key /tmp/deploy-env.sh

      - name: 登出 Tailscale
        if: always()
        continue-on-error: true
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_SECRET }}
          tags: ${{ env.TAILSCALE_TAG }}
          args: logout

  # ============================================================
  # 注：前端由 Cloudflare Pages 自动部署（GitHub 集成，监听仓库 push 事件）
  # ============================================================
  health-check:
    needs: deploy-backend
    if: |
      always() &&
      needs.deploy-backend.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: 等待服务就绪
        run: sleep 15

      - name: API 健康检查
        env:
          API_URL: ${{ vars.API_URL || secrets.API_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "::warning::未配置 API_URL，跳过健康检查"
            exit 0
          fi
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 --max-time 10 \
              "$API_URL/api/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ 后端健康 ($STATUS)"
              exit 0
            fi
            echo "⏳ 等待... ($STATUS) [$i/15]"
            sleep 6
          done
          echo "❌ 后端健康检查失败!"
          exit 1

  # ============================================================
  # Stage 5: 后端自动回滚（通过 Tailscale SSH）
  # ============================================================
  rollback:
    needs: [deploy-backend, health-check]
    if: |
      always() &&
      needs.deploy-backend.result == 'success' &&
      needs.health-check.result == 'failure'
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}
    env:
      TAILSCALE_HOST: ${{ secrets.TAILSCALE_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: 连接 Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_SECRET }}
          tags: ${{ env.TAILSCALE_TAG }}

      - name: 配置 SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" \
            -H "$TAILSCALE_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 执行远程回滚
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 \
            -p "$SSH_PORT" \
            "$SSH_USER@$TAILSCALE_HOST" \
            "cd \"$DEPLOY_PATH\" && bash deploy-remote.sh --rollback"
          echo "::warning::后端自动回滚已执行!"

      - name: 清理
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key

      - name: 登出 Tailscale
        if: always()
        continue-on-error: true
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_SECRET }}
          tags: ${{ env.TAILSCALE_TAG }}
          args: logout

  # ============================================================
  # Stage 6: 部署汇总
  # ============================================================
  notify:
    needs: [deploy-backend, health-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 汇总部署状态
        run: |
          BACKEND_STATUS="${{ needs.deploy-backend.result }}"
          HEALTH_STATUS="${{ needs.health-check.result }}"

          echo "# 部署报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 后端 (Tailscale SSH) | $([ "$BACKEND_STATUS" = 'success' ] && echo '✅' || ([ "$BACKEND_STATUS" = 'skipped' ] && echo '⏭️') || echo '❌') |" >> $GITHUB_STEP_SUMMARY
          echo "| 前端 | Cloudflare Pages 自动部署 |" >> $GITHUB_STEP_SUMMARY
          echo "| 健康检查 | $([ "$HEALTH_STATUS" = 'success' ] && echo '✅' || ([ "$HEALTH_STATUS" = 'skipped' ] && echo '⏭️') || echo '⚠️ 已回滚') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 后端 API: ${{ vars.API_URL || '未配置' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 前端: https://${{ vars.CLOUDFLARE_PROJECT_NAME || 'forklift-training' }}.pages.dev" >> $GITHUB_STEP_SUMMARY
        shell: bash
