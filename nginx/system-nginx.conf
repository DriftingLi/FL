# ===== 系统 nginx 反代配置 =====
# 放到服务器的 /etc/nginx/sites-enabled/ 或 /etc/nginx/conf.d/
# Proxmox 的 nginx 配置在 /etc/nginx/conf.d/pve.conf 中监听 80，需替换或附加

server {
    listen 80;
    listen [::]:80;

    server_name forklifttraining.asia www.forklifttraining.asia api.forklifttraining.asia;

    # API 反代到后端容器
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    # 静态文件和前端页面反代到前端容器
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 健康检查直连后端
    location = /health {
        proxy_pass http://127.0.0.1:8080/api/health;
        access_log off;
    }
}
